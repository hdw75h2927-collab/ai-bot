services:
  - type: web
    name: telegram-ai-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: GIGACHAT_CLIENT_ID
        sync: false
      - key: GIGACHAT_CLIENT_SECRET
        sync: false
      - key: GIGACHAT_SCOPE
        value: GIGACHAT_API_PERS
      - key: GIGACHAT_MODEL
        value: GigaChat-Lite
    autoDeploy: false